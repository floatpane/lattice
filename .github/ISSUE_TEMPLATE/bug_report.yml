name: Bug Report
description: Create a report to help us improve
title: "BUG: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: input
    id: matcha-version
    attributes:
      label: Matcha version
      placeholder: "e.g. 0.20.0"

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: "Run `go version` to find out. Only relevant if the issue is related to Go/compilation."
      placeholder: "e.g. 1.22.0"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "e.g. iTerm2, Windows Terminal, Alacritty"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
